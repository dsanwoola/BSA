# Firebase Hosting live deploy on main.
# Static app: no build step; run committed Node tests before live deploy.

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  test_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run tests
        run: node tests/run_tests.js
      - name: JavaScript syntax check
        run: |
          for f in js/*.js tests/run_tests.js sync-to-github.js; do node -c "$f"; done
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BANK_STATEMENT_AUDITOR }}
          channelId: live
          projectId: bank-statement-auditor
