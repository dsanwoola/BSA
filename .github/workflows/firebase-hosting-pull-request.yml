# Firebase Hosting preview deploy for pull requests.
# Static app: no build step; run committed Node tests before preview deploy.

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  test_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run tests
        run: node tests/run_tests.js
      - name: JavaScript syntax check
        run: |
          for f in js/*.js tests/run_tests.js sync-to-github.js; do node -c "$f"; done
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BANK_STATEMENT_AUDITOR }}
          projectId: bank-statement-auditor
